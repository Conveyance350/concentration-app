<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>色差識別レベル テスト｜構内物流</title>
<style>
  :root{
    --ink:#161C22; --paper:#F4F1E8; --panel:#FFFFFF; --line:#D8D2C2;
    --navy:#1B2A41; --amber:#C77A1E; --good:#2F6B3A; --bad:#B23B2E; --mute:#6B675C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',system-ui,sans-serif;
    display:flex; justify-content:center; padding:24px 16px;
  }
  .wrap{width:100%; max-width:480px;}
  .eyebrow{font-size:11px; letter-spacing:2px; color:var(--mute); text-transform:uppercase;}
  .progress{display:flex; gap:6px; margin-top:10px; margin-bottom:20px;}
  .progress span{flex:1; height:4px; border-radius:2px; background:var(--line);}
  .progress span.on{background:var(--navy);}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:24px;}
  h1{font-size:20px; margin:0 0 12px; font-weight:700;}
  h2{font-size:16px; margin:0 0 6px;}
  p.lead{font-size:14px; line-height:1.8; color:#3A3F44; margin:0 0 14px;}
  p.sub{font-size:13px; color:#3A3F44; margin:0 0 16px;}
  ul.notes{font-size:13px; line-height:1.9; color:var(--mute); padding-left:18px; margin:0 0 18px;}
  label.fld{font-size:13px; font-weight:700; color:#3A3F44; display:block; margin-bottom:6px;}
  input[type=text]{width:100%; font-size:15px; padding:10px 12px; border:1px solid var(--line); border-radius:8px;}
  input.num{font-size:22px; text-align:center; padding:10px 12px; margin-bottom:14px;}
  .btnP{width:100%; padding:12px 16px; background:var(--navy); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer;}
  .btnP:disabled{opacity:.45; cursor:not-allowed;}
  .btnS{width:100%; padding:12px 16px; background:#fff; color:var(--navy); border:1px solid var(--navy); border-radius:8px; font-size:14px; font-weight:700; cursor:pointer;}
  .muted{font-size:12px; color:var(--mute);}
  canvas{border-radius:50%; display:block;}
  .center{display:flex; justify-content:center; margin-bottom:18px;}
  .rowline{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .timerbar{height:5px; background:var(--line); border-radius:3px; margin-bottom:16px; overflow:hidden;}
  .timerbar>div{height:100%; background:var(--navy);}
  .grid16{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}
  .grid16 button{aspect-ratio:1; border:none; border-radius:8px; cursor:pointer; padding:0;}
  .verdict{padding:14px 16px; border-radius:10px; margin-bottom:18px;}
  .verdict .t{font-size:11px; color:var(--mute); margin-bottom:4px;}
  .verdict .v{font-size:18px; font-weight:700;}
  .resHead{display:flex; justify-content:space-between; align-items:baseline; padding-bottom:12px; margin-bottom:16px; border-bottom:2px solid var(--navy);}
  .resHead .nm{font-size:16px; font-weight:700;}
  .sec{font-size:13px; font-weight:700; margin-bottom:6px;}
  .kv{display:flex; justify-content:space-between; font-size:12px; padding:6px 0; border-bottom:1px solid var(--line); color:#3A3F44;}
  .ok{color:var(--good); font-weight:700;} .ng{color:var(--bad); font-weight:700;}
  .axisrow{padding:8px 0; border-bottom:1px solid var(--line);}
  .axisrow .lab{display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;}
  .axisbar{height:6px; background:var(--line); border-radius:3px; overflow:hidden;}
  .warn{font-size:12px; color:#3A3F44; background:rgba(199,122,30,.07); border:1px solid rgba(199,122,30,.27); border-radius:8px; padding:10px 12px; margin-bottom:16px;}
  .disc{font-size:12px; color:var(--mute); line-height:1.8; margin:0 0 18px;}
  .spacer{height:10px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">構内物流 色差識別レベルテスト</div>
  <div class="progress" id="prog">
    <span></span><span></span><span></span><span></span>
  </div>
  <div id="app"></div>
</div>

<script>
// ===== 定数・データ =========================================================
const T = { good:"#2F6B3A", bad:"#B23B2E", amber:"#C77A1E", navy:"#1B2A41" };
const TIME_LIMIT = 4000;
const MAX_LEVEL = 6;

const PLATES = [
  { digit:"8", fg:["#C77A1E","#D98A2E","#B96A12"], bg:["#8C9B5E","#9BAA6C","#7D8C50"], axis:"赤緑", control:false },
  { digit:"6", fg:["#3D6FB4","#4A7CC0","#3364A6"], bg:["#B9B3A0","#CFC9B6","#A6A08D"], axis:"対照", control:true },
  { digit:"2", fg:["#CC7722","#DA8632","#BE6812"], bg:["#6F8E52","#7F9E62","#5F7E42"], axis:"赤緑", control:false },
];

// 各段階の色差(ΔE)を全軸で約[14,10,7,5,3.5,2.5,1.8]に揃えたstep配列
const AXES = [
  { name:"赤緑",     base:[15,55,45],  dir:"h", sign:+1, steps:[10.6,7.65,5.41,3.89,2.74,1.96,1.42] },
  { name:"黄緑",     base:[70,50,50],  dir:"h", sign:+1, steps:[16.12,11.32,7.84,5.57,3.88,2.76,1.99] },
  { name:"青緑",     base:[175,45,45], dir:"h", sign:-1, steps:[13.95,9.94,6.94,4.95,3.47,2.47,1.78] },
  { name:"青紫",     base:[250,45,50], dir:"h", sign:+1, steps:[24.19,17.86,12.88,9.41,6.71,4.86,3.53] },
  { name:"赤ピンク", base:[350,55,50], dir:"h", sign:+1, steps:[10.79,7.3,5.1,3.64,2.54,1.82,1.31] },
  { name:"彩度差",   base:[20,40,50],  dir:"s", sign:+1, steps:[13.35,9.53,6.68,4.77,3.34,2.39,1.72] },
  { name:"明度差",   base:[120,40,45], dir:"l", sign:+1, steps:[14.5,10.79,8.0,5.5,3.8,2.5,1.7] },
];

function hsl(h,s,l){ return `hsl(${h}, ${s}%, ${l}%)`; }
function oddColor(axis, level){
  const [h,s,l]=axis.base; const step=axis.steps[level]*axis.sign;
  if(axis.dir==="h") return { base:hsl(h,s,l), odd:hsl(h+step,s,l) };
  if(axis.dir==="s") return { base:hsl(h,s,l), odd:hsl(h,s+step,l) };
  return { base:hsl(h,s,l), odd:hsl(h,s,l+step) };
}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return h>>>0;}
function mulberry32(seed){let a=seed;return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}

// ===== 数字図版描画 =========================================================
function drawPlate(canvas, plate, size){
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  canvas.width=size*dpr; canvas.height=size*dpr;
  canvas.style.width=size+"px"; canvas.style.height=size+"px";
  ctx.scale(dpr,dpr); ctx.clearRect(0,0,size,size);
  const mask=document.createElement("canvas"); mask.width=size; mask.height=size;
  const mctx=mask.getContext("2d");
  mctx.fillStyle="#000"; mctx.fillRect(0,0,size,size);
  mctx.fillStyle="#fff";
  mctx.font=`bold ${size*0.62}px "Arial Black", Arial, sans-serif`;
  mctx.textAlign="center"; mctx.textBaseline="middle";
  mctx.fillText(plate.digit, size/2, size/2+size*0.03);
  const md=mctx.getImageData(0,0,size,size).data;
  const isFig=(x,y)=>md[(Math.floor(y)*size+Math.floor(x))*4]>128;
  const cx=size/2, cy=size/2, R=size/2-4;
  const rand=mulberry32(hashStr(plate.digit+plate.axis));
  const dots=[]; const minR=size*0.014, maxR=size*0.028; let att=0;
  while(dots.length<900 && att<20000){
    att++;
    const a=rand()*Math.PI*2, rr=Math.sqrt(rand())*R;
    const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr;
    const r=minR+rand()*(maxR-minR); let ok=true;
    for(let i=Math.max(0,dots.length-40);i<dots.length;i++){
      const d=dots[i], dx=d.x-x, dy=d.y-y;
      if(Math.sqrt(dx*dx+dy*dy)<(d.r+r)*0.92){ ok=false; break; }
    }
    if(!ok) continue;
    const pal=isFig(x,y)?plate.fg:plate.bg;
    dots.push({x,y,r,color:pal[Math.floor(rand()*pal.length)]});
  }
  dots.forEach(d=>{ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=d.color;ctx.fill();});
}

// ===== 状態 =================================================================
const S = {
  stage:"intro", name:"",
  pi:0, pAns:[], // 数字図版
  axisIdx:0, level:0, thresholds:[], qSeed:1, // 色差識別
  timer:null,
};

const app=document.getElementById("app");
const prog=document.getElementById("prog").children;
function setProg(){
  const m={intro:0,plates:1,discrim:2,result:3};
  const cur=m[S.stage];
  for(let i=0;i<4;i++) prog[i].className = i<=cur ? "on" : "";
}

function screenSize(){ return Math.min(280, Math.max(200, window.innerWidth-96)); }

// ===== 画面：intro ==========================================================
function renderIntro(){
  app.innerHTML=`
  <div class="card">
    <h1>色差識別レベル テスト</h1>
    <p class="lead">数字図版で明確な色覚異常を一次スクリーニングした後、複数の色軸で色差を段階的に詰め、「どこまで細かい色違いを見分けられるか」を測定します。各段階の色差は全軸で知覚的に揃えてあり、軸ごとの難易度は公平です。各問に制限時間があり、現場の瞬時判断に近い条件で確認します。所要約4分。</p>
    <div style="margin-bottom:16px;">
      <label class="fld">氏名（受検者）</label>
      <input type="text" id="nameInput" placeholder="例）山田 太郎" value="${S.name.replace(/"/g,'&quot;')}">
    </div>
    <ul class="notes">
      <li>画面の明るさを最大付近にし、屋内の白色光の下で実施</li>
      <li>画面から約40〜50cm離れて見る</li>
      <li>正解するほど色差が小さくなり、見分けられなくなった段階がその色軸の識別限界</li>
      <li>本アプリは簡易スクリーニング。所見ありなら眼科・産業医の受診へ</li>
    </ul>
    <button class="btnP" id="startBtn" disabled>氏名を入力してください</button>
  </div>`;
  const input=document.getElementById("nameInput");
  const btn=document.getElementById("startBtn");
  const sync=()=>{
    S.name=input.value;
    const ok=input.value.trim().length>0;
    btn.disabled=!ok;
    btn.textContent = ok ? "検査を開始" : "氏名を入力してください";
  };
  input.addEventListener("input", sync); sync();
  btn.addEventListener("click", ()=>{ if(input.value.trim()){ S.stage="plates"; S.pi=0; S.pAns=[]; render(); }});
}

// ===== 画面：数字図版 =======================================================
function renderPlates(){
  const p=PLATES[S.pi];
  app.innerHTML=`
  <div class="card">
    <div class="muted" style="margin-bottom:10px;">一次スクリーニング 図版 ${S.pi+1} / ${PLATES.length}</div>
    <div class="center"><canvas id="plate"></canvas></div>
    <p class="sub" style="text-align:center;">図の中に見える数字を入力。わからなければ空欄で「次へ」。</p>
    <input type="text" inputmode="numeric" id="digit" class="num" placeholder="数字" style="width:100%;">
    <button class="btnP" id="next">${S.pi+1<PLATES.length?"次へ":"色差識別テストへ"}</button>
  </div>`;
  const size=screenSize();
  drawPlate(document.getElementById("plate"), p, size);
  const di=document.getElementById("digit");
  di.addEventListener("input", ()=>{ di.value=di.value.replace(/[^0-9]/g,"").slice(0,1); });
  document.getElementById("next").addEventListener("click", ()=>{
    const val=di.value.trim();
    const ok=val===p.digit;
    S.pAns.push({digit:p.digit, given:val||"(未回答)", ok, axis:p.axis, control:p.control});
    if(S.pi+1<PLATES.length){ S.pi++; render(); }
    else { S.stage="discrim"; S.axisIdx=0; S.level=0; S.thresholds=[]; S.qSeed=1; render(); }
  });
}

// ===== 画面：色差識別 =======================================================
function renderDiscrim(){
  const axis=AXES[S.axisIdx];
  app.innerHTML=`
  <div class="card">
    <div class="rowline">
      <div class="muted">色軸 ${S.axisIdx+1}/${AXES.length}・${axis.name}</div>
      <div class="muted">難易度 ${S.level+1}/${MAX_LEVEL+1}</div>
    </div>
    <div class="timerbar"><div id="tbar" style="width:100%;"></div></div>
    <h2>1つだけ違う色をタップ</h2>
    <p class="sub">16マス中1マスだけ色が違います。制限時間内に見つけてタップ。だんだん差が小さくなります。</p>
    <div class="grid16" id="grid"></div>
  </div>`;

  const {base,odd}=oddColor(axis,S.level);
  const rand=mulberry32(hashStr(`${S.axisIdx}-${S.level}-${S.qSeed}`));
  const oddIdx=Math.floor(rand()*16);
  const grid=document.getElementById("grid");
  for(let i=0;i<16;i++){
    const b=document.createElement("button");
    b.style.background = i===oddIdx ? odd : base;
    b.addEventListener("click", ()=>answer(i===oddIdx));
    grid.appendChild(b);
  }

  // タイマー
  const tbar=document.getElementById("tbar");
  const start=Date.now();
  clearInterval(S.timer);
  S.timer=setInterval(()=>{
    const left=TIME_LIMIT-(Date.now()-start);
    if(left<=0){ clearInterval(S.timer); answer(false); }
    else { tbar.style.width=(left/TIME_LIMIT*100)+"%"; tbar.style.background = left<1200 ? T.bad : T.navy; }
  },50);
}

function answer(correct){
  clearInterval(S.timer);
  if(correct && S.level<MAX_LEVEL){
    S.level++; S.qSeed++; render();
  } else {
    const reached = correct ? S.level : S.level-1;
    S.thresholds.push({axis:AXES[S.axisIdx].name, reached:Math.max(-1,reached)});
    if(S.axisIdx+1<AXES.length){ S.axisIdx++; S.level=0; S.qSeed++; render(); }
    else { S.stage="result"; render(); }
  }
}

// ===== 画面：結果 ===========================================================
function renderResult(){
  const pScore=S.pAns.filter(a=>a.ok).length;
  const controlOk=S.pAns.filter(a=>a.control).every(a=>a.ok);
  const plateFail=S.pAns.some(a=>!a.control && !a.ok);
  const avgReached = S.thresholds.length ? S.thresholds.reduce((s,t)=>s+Math.max(0,t.reached),0)/S.thresholds.length : 0;
  const weakAxes = S.thresholds.filter(t=>t.reached<=1).map(t=>t.axis);

  let overall="良好", oc=T.good;
  if(!controlOk){ overall="判定不能（明るさ・環境要確認）"; oc=T.amber; }
  else if(plateFail || weakAxes.length>=2){ overall="色の識別に低下の可能性／要眼科受診"; oc=T.bad; }
  else if(weakAxes.length===1){ overall="一部の色軸で識別やや弱め"; oc=T.amber; }

  const now=new Date().toLocaleString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});

  const plateRows=S.pAns.map((a,i)=>
    `<div class="kv"><span>図版${i+1}（${a.axis}｜正答:${a.digit}／回答:${a.given}）</span><span class="${a.ok?'ok':'ng'}">${a.ok?'○':'×'}</span></div>`
  ).join("");

  const axisRows=S.thresholds.map(t=>{
    const lv=Math.max(0,t.reached)+1;
    const weak=t.reached<=1;
    return `<div class="axisrow">
      <div class="lab"><span style="color:#3A3F44;">${t.axis}</span>
      <span class="${weak?'ng':'ok'}">Lv ${lv}/${MAX_LEVEL+1}${weak?'（要注意）':''}</span></div>
      <div class="axisbar"><div style="height:100%;width:${lv/(MAX_LEVEL+1)*100}%;background:${weak?T.bad:T.good};"></div></div>
    </div>`;
  }).join("");

  const warn = weakAxes.length>0 ?
    `<div class="warn">大きな色差でしか見分けにくい軸：<b>${weakAxes.join("、")}</b><br>これらの色域では、現場で微妙な色違いの取り違えが起きやすい可能性があります。</div>` : "";

  app.innerHTML=`
  <div class="card">
    <div class="resHead">
      <div class="nm">${escapeHtml(S.name)} 様</div>
      <div class="muted">${now}</div>
    </div>
    <div class="verdict" style="background:${oc}18;border:1px solid ${oc}55;">
      <div class="t">総合判定（簡易・参考値）</div>
      <div class="v" style="color:${oc};">${overall}</div>
      <div class="muted" style="margin-top:6px;">平均到達レベル ${avgReached.toFixed(1)} / ${MAX_LEVEL+1}（高いほど細かい色差まで識別可）</div>
    </div>
    <div class="sec">一次スクリーニング（数字図版）：${pScore} / ${PLATES.length} 正答</div>
    <div style="margin-bottom:16px;">${plateRows}</div>
    <div class="sec">色軸別 色差識別レベル</div>
    <div style="margin-bottom:16px;">${axisRows}</div>
    ${warn}
    <p class="disc">※ このテストは簡易的なチェックです。医学的な診断ではありませんので、気になる結果が出た場合は、産業医への相談や眼科（色覚外来）での検査を受けてみてください。あわせて、色だけに頼らずラベルや形・記号も使った見分け方を取り入れておくと、より安心です。</p>
    <button class="btnP" id="csvBtn" style="margin-bottom:10px;">結果をCSVで保存</button>
    <button class="btnS" id="again">もう一度検査する</button>
  </div>`;

  document.getElementById("again").addEventListener("click", ()=>{
    S.stage="intro"; S.name=""; S.pi=0; S.pAns=[]; S.axisIdx=0; S.level=0; S.thresholds=[]; S.qSeed=1; render();
  });
  document.getElementById("csvBtn").addEventListener("click", ()=>exportCSV(now, overall, avgReached, pScore));
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ===== CSV出力 ==============================================================
function exportCSV(now, overall, avgReached, pScore){
  let rows=[];
  rows.push(["氏名", S.name]);
  rows.push(["受検日時", now]);
  rows.push(["総合判定", overall]);
  rows.push(["平均到達レベル", avgReached.toFixed(1)+" / "+(MAX_LEVEL+1)]);
  rows.push(["数字図版正答", pScore+" / "+PLATES.length]);
  rows.push([]);
  rows.push(["数字図版","正答","回答","判定"]);
  S.pAns.forEach((a,i)=>rows.push(["図版"+(i+1)+"("+a.axis+")", a.digit, a.given, a.ok?"○":"×"]));
  rows.push([]);
  rows.push(["色軸","到達レベル","満点"]);
  S.thresholds.forEach(t=>rows.push([t.axis, Math.max(0,t.reached)+1, MAX_LEVEL+1]));
  const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`色差識別テスト_${S.name||"受検者"}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== ルーター =============================================================
function render(){
  setProg();
  if(S.stage==="intro") renderIntro();
  else if(S.stage==="plates") renderPlates();
  else if(S.stage==="discrim") renderDiscrim();
  else if(S.stage==="result") renderResult();
}
render();
</script>
</body>
</html>
