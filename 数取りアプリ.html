<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>QR数取りチェッカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.11.0/dist/index.js"></script>
<script>
  // zbar-wasm の wasm ファイル位置をCDNに固定
  window.addEventListener('load', function(){
    try{
      if(window.zbarWasm && window.zbarWasm.setModuleArgs){
        window.zbarWasm.setModuleArgs({
          locateFile: function(f){ return 'https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.11.0/dist/' + f; }
        });
      }
    }catch(e){}
  });
</script>
<style>
  html, body{margin:0;padding:0;}
  :root{
    --bg:#14171a;
    --panel:#1e2226;
    --panel2:#262b30;
    --line:#343a40;
    --text:#eef1f3;
    --sub:#8b949a;
    --amber:#f0a300;
    --amber-dim:#8a6100;
    --green:#12b866;
    --green-dim:#0a5c34;
    --red:#e6392b;
    --red-dim:#7a1a12;
    --mono: 'SFMono-Regular', Consolas, 'Roboto Mono', monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  #app{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    min-height:100vh;
    padding:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    overflow:hidden;
  }
  .wrap{width:100%;max-width:480px;padding:20px 18px 40px;}

  .hdr{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:14px 18px 10px;width:100%;max-width:480px;
    border-bottom:1px solid var(--line);
  }
  .hdr h1{font-size:15px;letter-spacing:.08em;margin:0;color:var(--amber);font-weight:700;}
  .hdr .badge{font-family:var(--mono);font-size:11px;color:var(--sub);text-align:right;line-height:1.5;}

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px;
    margin-top:18px;
  }
  label.field-label{display:block;font-size:13px;color:var(--sub);margin-bottom:8px;letter-spacing:.03em;}
  .field-gap{margin-top:18px;}
  input[type=number], input[type=text]{
    width:100%;
    background:var(--panel2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:var(--mono);
    font-size:22px;
    padding:14px 12px;
    border-radius:8px;
    text-align:center;
    letter-spacing:.05em;
  }
  #expectedInput{font-size:28px;}
  input[type=number]:focus, input[type=text]:focus{outline:2px solid var(--amber);}
  .btn{
    display:block;width:100%;
    background:var(--amber);
    color:#1a1200;
    font-weight:700;
    font-size:16px;
    padding:15px;
    border:none;border-radius:8px;
    margin-top:18px;
    cursor:pointer;
    letter-spacing:.03em;
  }
  .btn:active{background:#c98900;}
  .btn.secondary{
    background:transparent;
    color:var(--text);
    border:1px solid var(--line);
    font-weight:600;
  }
  .btn.csv{
    background:var(--panel2);
    color:var(--amber);
    border:1px solid var(--amber-dim);
    font-weight:700;
  }
  .btn.ghost{background:transparent;color:var(--sub);border:1px solid var(--line);font-weight:500;font-size:13px;padding:10px;}
  .hint{font-size:12px;color:var(--sub);margin-top:10px;line-height:1.6;}

  .tally{
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin:22px 0 6px;
  }
  .tally .digits{
    font-family:var(--mono);
    font-size:56px;font-weight:700;
    background:#0c0e10;
    border:2px solid var(--line);
    border-radius:6px;
    padding:6px 18px;
    letter-spacing:2px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,.6);
    color:var(--amber);
    min-width:150px;text-align:center;
  }
  .tally .of{font-family:var(--mono);font-size:22px;color:var(--sub);}
  .tally .total{font-family:var(--mono);font-size:22px;color:var(--sub);}
  .status-line{text-align:center;font-size:13px;color:var(--sub);margin-bottom:14px;letter-spacing:.05em;}
  .status-line.live{color:var(--green);}
  .status-line.live:before{content:"● ";}
  .reader-line{text-align:center;font-size:12px;color:var(--sub);margin-bottom:10px;}
  .reader-line b{color:var(--text);}
  .ref-line{text-align:center;font-size:13px;color:var(--sub);margin-bottom:6px;}
  .ref-line b{color:var(--amber);font-family:var(--mono);letter-spacing:.05em;}

  .scanbox{
    position:relative;width:100%;aspect-ratio:1/1;
    background:#000;border-radius:10px;overflow:hidden;
    border:1px solid var(--line);
  }
  .scanbox video{width:100%;height:100%;object-fit:cover;display:block;}
  .scanbox .frame{
    position:absolute;inset:14%;
    border:2px solid var(--amber);
    border-radius:8px;
    opacity:.85;
    pointer-events:none;
  }
  .scanbox .frame:after{
    content:"";position:absolute;left:0;right:0;top:0;height:2px;
    background:var(--amber);
    animation:scanline 1.8s linear infinite;
  }
  @keyframes scanline{0%{top:0;}100%{top:100%;}}
  .camerr{padding:24px;text-align:center;color:var(--sub);font-size:13px;line-height:1.7;}

  .log{margin-top:16px;}
  .log h2{font-size:12px;color:var(--sub);letter-spacing:.08em;margin:0 0 8px;}
  .log ul{list-style:none;margin:0;padding:0;max-height:220px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;}
  .log li{
    display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:13px;
    padding:10px 12px;border-bottom:1px solid var(--line);
  }
  .log li:last-child{border-bottom:none;}
  .log li .n{color:var(--sub);width:26px;flex-shrink:0;}
  .log li .code{flex:1;color:var(--text);letter-spacing:.03em;}
  .log li .ok{color:var(--green);font-size:11px;font-weight:700;}
  .log-empty{padding:16px;text-align:center;color:var(--sub);font-size:12px;}

  .actions-row{display:flex;gap:10px;margin-top:14px;}
  .actions-row .btn{margin-top:0;}
  .actions-row2{display:flex;gap:10px;margin-top:10px;}
  .actions-row2 .btn{margin-top:0;}

  .overlay{
    position:fixed;inset:0;z-index:50;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;
  }
  .overlay.error{background:var(--red);animation:flashRed .5s ease-in-out 2;}
  .overlay.dup{background:var(--red);}
  .overlay.done{background:var(--green);}
  @keyframes flashRed{0%,100%{background:var(--red);}50%{background:#8f1810;}}
  .overlay .big{font-size:26px;font-weight:800;color:#fff;letter-spacing:.04em;margin-bottom:10px;}
  .overlay .sub{font-size:14px;color:rgba(255,255,255,.9);margin-bottom:22px;line-height:1.6;font-family:var(--mono);max-width:340px;word-break:break-all;max-height:35vh;overflow-y:auto;}
  .overlay .btn{max-width:280px;background:#fff;color:#111;}
  .overlay .btn.csv2{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.6);}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}

  #app{
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }
</style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <h1>QR 数取りチェッカー</h1>
    <div class="badge" id="hdrBadge">未設定</div>
  </div>

  <div class="wrap">

    <div id="screenSetup">
      <div class="card">
        <label class="field-label">読取者名</label>
        <input type="text" id="readerInput" placeholder="例: 山田 太郎">

        <div class="field-gap">
          <label class="field-label">読取り予定枚数</label>
          <input type="number" id="expectedInput" inputmode="numeric" min="1" placeholder="例: 9">
        </div>

        <button class="btn" id="startBtn">スキャン開始</button>
        <div class="hint">同一品番であるべき枚数を入力します。最初に読んだQRを「基準品番」として記憶し、2枚目以降が基準と一致すればOK、違う品番が混ざっていればNGにします。指定枚数に達すると完了です。結果はCSVで書き出せます。</div>
      </div>
    </div>

    <div id="screenScan" style="display:none;">
      <div class="reader-line">読取者: <b id="readerNameShow">-</b></div>
      <div class="ref-line" id="refLine">基準品番: <b id="refCodeShow">未設定（1枚目を読取り）</b></div>
      <div class="tally">
        <div class="digits" id="digitsCount">0</div>
        <div class="of">/</div>
        <div class="total" id="digitsTotal">0</div>
      </div>
      <div class="status-line live" id="statusLine">QRを枠内に写して「この1枚を読み取る」を押す</div>

      <div class="scanbox" id="scanbox">
        <video id="video" playsinline webkit-playsinline muted autoplay></video>
        <div class="frame"></div>
      </div>

      <button class="btn" id="frameBtn" style="margin-top:12px;font-size:18px;padding:18px;">この1枚を読み取る</button>
      <div class="hint" style="text-align:center;margin-top:8px;">1枚ごとにボタンを押してください（1タップ＝1枚）。ピントが合わず読めない時は「📷 撮影して読み取る」を使用。</div>
      <input type="file" id="captureInput" accept="image/*" capture="environment" style="display:none;">
      <button class="btn secondary" id="captureBtn" style="margin-top:8px;">📷 撮影して読み取る（高精度）</button>

      <div class="actions-row">
        <button class="btn secondary" id="resetBtn" style="flex:1;">リセット</button>
        <button class="btn secondary" id="manualBtn" style="flex:1;">手入力</button>
      </div>
      <div class="actions-row2">
        <button class="btn csv" id="csvBtn" style="flex:1;">CSV出力</button>
      </div>

      <div class="log">
        <h2>読取り履歴</h2>
        <ul id="logList"></ul>
        <div class="log-empty" id="logEmpty">まだ読み取っていません</div>
      </div>
    </div>

  </div>

  <div id="manualPanel" style="display:none;position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:380px;">
      <label class="field-label">12桁コードを手入力</label>
      <input type="text" id="manualInput" maxlength="12" placeholder="例: 512654703000">
      <button class="btn" id="manualSubmit">登録</button>
      <button class="btn ghost" id="manualCancel" style="margin-top:8px;">閉じる</button>
    </div>
  </div>

  <div id="overlayRoot"></div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const screenSetup = $('screenSetup');
  const screenScan = $('screenScan');
  const readerInput = $('readerInput');
  const readerNameShow = $('readerNameShow');
  const expectedInput = $('expectedInput');
  const startBtn = $('startBtn');
  const digitsCount = $('digitsCount');
  const digitsTotal = $('digitsTotal');
  const statusLine = $('statusLine');
  let video = $('video');
  const scanbox = $('scanbox');
  const frameBtn = $('frameBtn');
  const refCodeShow = $('refCodeShow');
  const logList = $('logList');
  const logEmpty = $('logEmpty');
  const resetBtn = $('resetBtn');
  const manualBtn = $('manualBtn');
  const captureBtn = $('captureBtn');
  const captureInput = $('captureInput');
  const csvBtn = $('csvBtn');
  const manualPanel = $('manualPanel');
  const manualInput = $('manualInput');
  const manualSubmit = $('manualSubmit');
  const manualCancel = $('manualCancel');
  const overlayRoot = $('overlayRoot');
  const hdrBadge = $('hdrBadge');

  let readerName = '';
  let expectedTotal = 0;
  let referenceCode = null; // 最初に読んだ基準品番
  let scannedList = [];
  let scannedSet = new Set();
  let fullLog = [];
  let stream = null;
  let rafId = null;
  let canvas = document.createElement('canvas');
  let ctx = canvas.getContext('2d', { willReadFrequently: true });
  let cooldownUntil = 0;
  let locked = false;

  let audioCtx = null;
  function ac(){ if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } return audioCtx; }
  function beep(freq, dur, type){
    try{
      const c = ac();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.18, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      osc.connect(gain); gain.connect(c.destination);
      osc.start(); osc.stop(c.currentTime + dur);
    }catch(e){}
  }
  function soundOk(){ beep(880,0.12,'sine'); setTimeout(()=>beep(1180,0.12,'sine'),120); }
  function soundErr(){ beep(220,0.35,'sawtooth'); setTimeout(()=>beep(180,0.4,'sawtooth'),260); }
  function soundDone(){ beep(660,0.14,'sine'); setTimeout(()=>beep(880,0.14,'sine'),140); setTimeout(()=>beep(1320,0.22,'sine'),280); }

  function escapeHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // zbar-wasm(高精度)を優先し、失敗時にjsQRへフォールバック
  async function decodeImageData(imgData){
    if(window.zbarWasm && window.zbarWasm.scanImageData){
      try{
        const symbols = await window.zbarWasm.scanImageData(imgData);
        if(symbols && symbols.length){
          const txt = symbols[0].decode();
          if(txt) return txt;
        }
      }catch(e){}
    }
    if(window.jsQR){
      try{
        const r = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'attemptBoth' });
        if(r && r.data) return r.data;
      }catch(e){}
    }
    return null;
  }

  function extractCode(raw){
    if(!raw) return null;
    const tokens = raw.trim().split(/\s+/);
    for(let i = tokens.length - 1; i >= 0; i--){
      const t = tokens[i];
      if(t.length === 12 && /^[0-9A-Za-z]{12}$/.test(t)){
        return t;
      }
    }
    const m = raw.match(/\d{12}/);
    return m ? m[0] : null;
  }

  function fmtTime(d){
    const p = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
  }

  function renderLog(){
    logList.innerHTML = '';
    if(scannedList.length === 0){
      logEmpty.style.display = 'block';
      return;
    }
    logEmpty.style.display = 'none';
    scannedList.slice().reverse().forEach((item, idx) => {
      const n = scannedList.length - idx;
      const li = document.createElement('li');
      li.innerHTML = `<span class="n">${n}</span><span class="code">${item.code}</span><span class="ok">OK</span>`;
      logList.appendChild(li);
    });
  }
  function renderCount(){
    digitsCount.textContent = String(scannedList.length).padStart(2,'0');
    digitsTotal.textContent = String(expectedTotal).padStart(2,'0');
  }

  function csvEscape(v){
    const s = String(v == null ? '' : v);
    if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
    return s;
  }
  function buildCsv(){
    const rows = [['読取者','基準品番','No','12桁コード','結果','読取日時','予定枚数','確定読取枚数']];
    fullLog.forEach(item => {
      rows.push([readerName, referenceCode || '', item.no, item.code || '', item.result, fmtTime(item.time), expectedTotal, scannedList.length]);
    });
    return rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
  }
  function downloadCsv(){
    if(fullLog.length === 0){
      alert('読取りデータがありません。');
      return;
    }
    const csv = '\uFEFF' + buildCsv();
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const p = n => String(n).padStart(2,'0');
    const d = new Date();
    const stamp = `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;
    const safeName = (readerName || 'unknown').replace(/[^\w\u3040-\u30FF\u4E00-\u9FFF]/g,'');
    a.href = url;
    a.download = `QR数取り_${safeName}_${stamp}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }
  csvBtn.addEventListener('click', downloadCsv);

  function showOverlay(kind, bigText, subText, onClose){
    const div = document.createElement('div');
    div.className = 'overlay ' + kind;
    div.innerHTML = `
      <div class="big">${bigText}</div>
      <div class="sub">${subText}</div>
      <button class="btn" id="overlayOkBtn">確認して続ける</button>
    `;
    overlayRoot.appendChild(div);
    div.querySelector('#overlayOkBtn').addEventListener('click', () => {
      overlayRoot.removeChild(div);
      locked = false;
      if(onClose) onClose();
    });
  }
  function showDoneOverlay(){
    const div = document.createElement('div');
    div.className = 'overlay done';
    div.innerHTML = `
      <div class="big">OK 完了</div>
      <div class="sub">読取者: ${readerName}<br>基準品番: ${referenceCode || '-'}<br>${expectedTotal} / ${expectedTotal} 枚すべて一致（異品番なし）</div>
      <button class="btn" id="doneCsvBtn">CSV出力</button>
      <button class="btn csv2" id="doneResetBtn">最初からやり直す</button>
    `;
    overlayRoot.appendChild(div);
    div.querySelector('#doneCsvBtn').addEventListener('click', downloadCsv);
    div.querySelector('#doneResetBtn').addEventListener('click', () => {
      overlayRoot.removeChild(div);
      hardReset();
    });
  }

  async function startCamera(){
    // リセット等でvideo要素が差し替わっている場合に備え、毎回取得し直す
    video = document.getElementById('video');
    // 既存ストリームが残っていれば停止
    if(stream){ try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){} stream = null; }
    statusLine.classList.add('live');
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      });
      video.srcObject = stream;
      video.setAttribute('playsinline','');
      await video.play();
      statusLine.textContent = 'QRを枠内に写して「この1枚を読み取る」を押す';
      statusLine.classList.add('live');
    }catch(err){
      scanbox.innerHTML = `<div class="camerr">カメラを起動できませんでした。<br>iPhoneの場合は「設定 &gt; Safari &gt; カメラ」で許可を確認してください。<br>カメラが使えない場合は下の「手入力」から登録できます。<br><span style="color:#666">(${err.message||err})</span></div>`;
      statusLine.textContent = 'カメラ利用不可 — 手入力を使用してください';
      statusLine.classList.remove('live');
    }
  }
  function stopCamera(){
    if(rafId) cancelAnimationFrame(rafId);
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream = null; }
  }
  // ライブ映像は「照準用」のみ。自動カウントはしない（同一品番QRは区別できないため）。
  function loopScan(){
    // 何もしない（映像はvideo要素がそのまま表示）。将来の拡張用に残置。
  }

  // 現在のカメラ映像から1フレームを取り込んで解析（「この1枚を読み取る」用）
  async function scanCurrentFrame(){
    if(locked) return;
    if(!video || !video.videoWidth){
      statusLine.textContent = 'カメラ準備中です。少し待って再度押してください';
      return;
    }
    frameBtn.disabled = true;
    frameBtn.textContent = '読取り中…';
    try{
      // 密度の高いQRに備え複数解像度で試行
      const vw = video.videoWidth, vh = video.videoHeight;
      const targets = [Math.max(vw, vh), 1600, 1200];
      let result = null;
      for(const t of targets){
        const scale = Math.min(1, t / Math.max(vw, vh));
        const w = Math.round(vw * scale), h = Math.round(vh * scale);
        canvas.width = w; canvas.height = h;
        ctx.drawImage(video, 0, 0, w, h);
        const imgData = ctx.getImageData(0, 0, w, h);
        result = await decodeImageData(imgData);
        if(result) break;
      }
      if(result){
        handleScan(result, 'frame');
      } else {
        soundErr();
        statusLine.textContent = '読み取れませんでした。近づけて再度押すか「📷 撮影」を使用';
      }
    } finally {
      frameBtn.disabled = false;
      frameBtn.textContent = 'この1枚を読み取る';
    }
  }

  function handleScan(rawData, source){
    const code = extractCode(rawData);

    if(!code){
      fullLog.push({ no: fullLog.length+1, code: rawData.slice(0,12), result: 'NG(抽出失敗)', time: new Date() });
      locked = true;
      soundErr();
      showOverlay('error', 'NG 読取エラー', `12桁のコードを抽出できませんでした。<br><br>読取った生データ:<br>${escapeHtml(rawData)}`);
      return;
    }

    // 枚数超過チェック
    if(scannedList.length >= expectedTotal){
      fullLog.push({ no: fullLog.length+1, code, result: 'NG(枚数超過)', time: new Date() });
      locked = true;
      soundErr();
      showOverlay('error', 'NG 枚数超過', `指定枚数(${expectedTotal}枚)を超えています。`);
      return;
    }

    // 1枚目 → 基準品番として登録
    if(referenceCode === null){
      referenceCode = code;
      refCodeShow.textContent = code;
    } else if(code !== referenceCode){
      // 基準と違う → 異品番混入NG
      fullLog.push({ no: fullLog.length+1, code, result: 'NG(異品番混入)', time: new Date() });
      locked = true;
      soundErr();
      showOverlay('error', 'NG 異品番混入', `基準品番 ${referenceCode} と異なります。<br><br>読取ったコード:<br>${code}`);
      return;
    }

    // OK（基準と一致、または1枚目）
    const time = new Date();
    scannedList.push({ code, time });
    scannedSet.add(code);
    fullLog.push({ no: fullLog.length+1, code, result: 'OK', time });
    renderLog();
    renderCount();
    soundOk();
    statusLine.textContent = `${scannedList.length}枚目 OK — 次の1枚を写して押してください`;

    if(scannedList.length === expectedTotal){
      locked = true;
      stopCamera();
      soundDone();
      showDoneOverlay();
    }
  }

  startBtn.addEventListener('click', () => {
    const name = readerInput.value.trim();
    const v = parseInt(expectedInput.value, 10);
    let bad = false;
    if(!name){
      readerInput.style.borderColor = 'var(--red)';
      bad = true;
    } else {
      readerInput.style.borderColor = '';
    }
    if(!v || v < 1){
      expectedInput.style.borderColor = 'var(--red)';
      bad = true;
    } else {
      expectedInput.style.borderColor = '';
    }
    if(bad) return;

    readerName = name;
    expectedTotal = v;
    referenceCode = null;
    scannedList = [];
    scannedSet = new Set();
    fullLog = [];
    hdrBadge.textContent = `${readerName} / 予定 ${expectedTotal} 枚`;
    readerNameShow.textContent = readerName;
    refCodeShow.textContent = '未設定（1枚目を読取り）';
    screenSetup.style.display = 'none';
    screenScan.style.display = 'block';
    renderCount();
    renderLog();
    startCamera();
  });

  function hardReset(){
    stopCamera();
    referenceCode = null;
    scannedList = [];
    scannedSet = new Set();
    fullLog = [];
    expectedTotal = 0;
    readerName = '';
    locked = false;
    cooldownUntil = 0;
    expectedInput.value = '';
    readerInput.value = '';
    expectedInput.style.borderColor = '';
    readerInput.style.borderColor = '';
    hdrBadge.textContent = '未設定';
    screenScan.style.display = 'none';
    screenSetup.style.display = 'block';
    scanbox.innerHTML = `<video id="video" playsinline webkit-playsinline muted autoplay></video><div class="frame"></div>`;
    video = document.getElementById('video');
  }
  resetBtn.addEventListener('click', () => {
    if(confirm('読取り履歴をリセットして最初からやり直しますか？')){
      hardReset();
    }
  });

  frameBtn.addEventListener('click', scanCurrentFrame);

  captureBtn.addEventListener('click', () => {
    captureInput.value = '';
    captureInput.click();
  });
  captureInput.addEventListener('change', () => {
    const file = captureInput.files && captureInput.files[0];
    if(!file) return;
    const img = new Image();
    const objUrl = URL.createObjectURL(file);
    img.onload = async () => {
      // 密度の高いQRに備え、複数の解像度で試行（大きめ優先）
      const targets = [2000, 1600, 1200, Math.max(img.naturalWidth, img.naturalHeight)];
      let result = null;
      for(const t of targets){
        const scale = Math.min(1, t / Math.max(img.naturalWidth, img.naturalHeight));
        const w = Math.round(img.naturalWidth * scale);
        const h = Math.round(img.naturalHeight * scale);
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const cctx = c.getContext('2d');
        cctx.drawImage(img, 0, 0, w, h);
        const imgData = cctx.getImageData(0, 0, w, h);
        result = await decodeImageData(imgData);
        if(result) break;
      }
      URL.revokeObjectURL(objUrl);
      if(result){
        handleScan(result, 'photo');
      } else {
        locked = true;
        soundErr();
        showOverlay('error', 'NG 読取失敗', '写真からQRコードを認識できませんでした。QRが画面いっぱいに写るよう近づけ、ピント・明るさを合わせて再度お試しください。');
      }
    };
    img.src = objUrl;
  });

  manualBtn.addEventListener('click', () => {
    manualPanel.style.display = 'flex';
    manualInput.value = '';
    manualInput.focus();
  });
  manualCancel.addEventListener('click', () => { manualPanel.style.display = 'none'; });
  manualSubmit.addEventListener('click', () => {
    const v = manualInput.value.trim();
    manualPanel.style.display = 'none';
    if(v.length === 12){
      handleScan(v, 'manual');
    } else if(v.length > 0){
      locked = true;
      soundErr();
      showOverlay('error', 'NG 入力エラー', '12桁で入力してください。');
    }
  });
})();
</script>
</body>
</html>
