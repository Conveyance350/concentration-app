<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集中力トレーニング ランキング</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    color: #1f2933; background: #f8fafc;
  }
  .rk-app { max-width: 860px; margin: 0 auto; padding: 24px 18px 48px; }
  .rk-header { border-bottom: 2px solid #1f4e79; padding-bottom: 12px; margin-bottom: 18px; }
  .rk-header h1 { font-size: 19px; font-weight: 700; margin: 0; letter-spacing: .02em; }
  .rk-header .rk-sub { font-size: 12px; color: #64748b; }
  .rk-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
  .rk-tab {
    padding: 8px 14px; font-size: 13px; cursor: pointer; border: 1px solid #cbd5e1;
    background: #fff; color: #475569; border-radius: 4px; font-weight: 600;
  }
  .rk-tab.active { background: #1f4e79; color: #fff; border-color: #1f4e79; }
  .rk-btn {
    background: #fff; color: #1f4e79; border: 1px solid #1f4e79; border-radius: 4px;
    padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; margin-left: auto;
    min-height: 40px;
  }
  .rk-btn:hover { background: #eef4fb; }
  .rk-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  table.rk-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.rk-table th, table.rk-table td { padding: 9px 10px; border-bottom: 1px solid #eef2f6; text-align: left; }
  table.rk-table th { color: #64748b; font-size: 12px; font-weight: 600; background: #f1f5f9; }
  table.rk-table td.num { text-align: center; font-variant-numeric: tabular-nums; }
  .rk-rank { font-weight: 700; text-align: center; width: 48px; }
  .rk-row-1 td { background: #fff7e0; }
  .rk-row-2 td { background: #fbfbf0; }
  .rk-row-3 td { background: #fdf6ee; }
  .rk-medal { font-size: 15px; }
  .rk-empty { color: #94a3b8; font-size: 13px; padding: 18px 0; text-align: center; }
  .rk-status { font-size: 12px; color: #64748b; margin-bottom: 10px; }
  .rk-total-note { font-size: 11px; color: #94a3b8; margin-top: 8px; }
  @media (max-width: 480px) {
    table.rk-table { font-size: 12px; }
    table.rk-table th, table.rk-table td { padding: 7px 5px; }
    .rk-header h1 { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="rk-app">
  <div class="rk-header">
    <h1>集中力トレーニング ランキング</h1>
    <span class="rk-sub">構内物流課</span>
  </div>

  <div class="rk-controls">
    <button class="rk-tab active" data-metric="total">総合</button>
    <button class="rk-tab" data-metric="シュルテ表">シュルテ表</button>
    <button class="rk-tab" data-metric="反応速度">反応速度</button>
    <button class="rk-tab" data-metric="ストループ">ストループ</button>
    <button class="rk-btn" id="rk-refresh">更新</button>
  </div>

  <div class="rk-card">
    <div class="rk-status" id="rk-status">読み込み中…</div>
    <div id="rk-body"></div>
    <div class="rk-total-note" id="rk-note"></div>
  </div>
</div>

<script>
(function () {
  // ▼Apps ScriptのウェブアプリURLを貼り付け
  var WEBAPP_URL = 'ここにデプロイURLを貼り付け';

  var $ = function (s) { return document.querySelector(s); };
  var currentMetric = 'total';
  var allRecords = [];

  // 各種目：小さいほど良い＝lower、大きいほど良い＝higher
  var METRIC_DIR = { 'シュルテ表': 'lower', '反応速度': 'lower', 'ストループ': 'higher' };
  var METRIC_UNIT = { 'シュルテ表': '秒', '反応速度': 'ms', 'ストループ': '点' };

  document.querySelectorAll('.rk-tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.rk-tab').forEach(function (t) { t.classList.remove('active'); });
      tab.classList.add('active');
      currentMetric = tab.dataset.metric;
      render();
    });
  });
  $('#rk-refresh').addEventListener('click', loadData);

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  // 各人の最新記録だけを種目ごとに抽出（同名は最後の記録を採用）
  function latestByPerson(metric) {
    var map = {};
    allRecords.forEach(function (r) {
      if (r.type !== metric) return;
      if (r.name === '' || r.scoreValue === '' || r.scoreValue === null) return;
      map[r.name] = { name: r.name, score: Number(r.scoreValue), date: r.date };
    });
    return Object.keys(map).map(function (k) { return map[k]; });
  }

  function rankMetric(metric) {
    var list = latestByPerson(metric);
    var dir = METRIC_DIR[metric];
    list.sort(function (a, b) { return dir === 'lower' ? a.score - b.score : b.score - a.score; });
    return list;
  }

  // 総合：各種目の順位（1位=1点…）を平均。実施種目数で割る
  function rankTotal() {
    var metrics = ['シュルテ表', '反応速度', 'ストループ'];
    var rankPos = {}; // name -> {sum, count, scores:{}}
    metrics.forEach(function (m) {
      var ranked = rankMetric(m);
      ranked.forEach(function (item, idx) {
        if (!rankPos[item.name]) rankPos[item.name] = { sum: 0, count: 0, scores: {} };
        rankPos[item.name].sum += (idx + 1);
        rankPos[item.name].count += 1;
        rankPos[item.name].scores[m] = item.score;
      });
    });
    var arr = Object.keys(rankPos).map(function (name) {
      var p = rankPos[name];
      return { name: name, avg: p.sum / p.count, count: p.count, scores: p.scores };
    });
    arr.sort(function (a, b) { return a.avg - b.avg; });
    return arr;
  }

  function medal(rank) {
    if (rank === 1) return '🥇';
    if (rank === 2) return '🥈';
    if (rank === 3) return '🥉';
    return '';
  }

  function render() {
    var body = $('#rk-body');
    var note = $('#rk-note');
    note.textContent = '';

    if (allRecords.length === 0) {
      body.innerHTML = '<div class="rk-empty">まだ記録がありません</div>';
      return;
    }

    if (currentMetric === 'total') {
      var arr = rankTotal();
      if (arr.length === 0) { body.innerHTML = '<div class="rk-empty">まだ記録がありません</div>'; return; }
      var html = '<table class="rk-table"><thead><tr>' +
        '<th class="rk-rank">順位</th><th>氏名</th><th>シュルテ(秒)</th><th>反応(ms)</th><th>ストループ(点)</th><th>平均順位</th>' +
        '</tr></thead><tbody>';
      arr.forEach(function (p, idx) {
        var rank = idx + 1;
        var cls = rank <= 3 ? ' class="rk-row-' + rank + '"' : '';
        html += '<tr' + cls + '>' +
          '<td class="rk-rank"><span class="rk-medal">' + medal(rank) + '</span> ' + rank + '</td>' +
          '<td>' + escapeHtml(p.name) + '</td>' +
          '<td class="num">' + (p.scores['シュルテ表'] !== undefined ? p.scores['シュルテ表'] : '-') + '</td>' +
          '<td class="num">' + (p.scores['反応速度'] !== undefined ? p.scores['反応速度'] : '-') + '</td>' +
          '<td class="num">' + (p.scores['ストループ'] !== undefined ? p.scores['ストループ'] : '-') + '</td>' +
          '<td class="num">' + p.avg.toFixed(1) + '</td>' +
          '</tr>';
      });
      html += '</tbody></table>';
      body.innerHTML = html;
      note.textContent = '※平均順位＝実施した各種目の順位の平均（小さいほど上位）。各人の最新結果を集計しています。';
    } else {
      var ranked = rankMetric(currentMetric);
      if (ranked.length === 0) { body.innerHTML = '<div class="rk-empty">この種目の記録はまだありません</div>'; return; }
      var unit = METRIC_UNIT[currentMetric];
      var html2 = '<table class="rk-table"><thead><tr>' +
        '<th class="rk-rank">順位</th><th>氏名</th><th>結果(' + unit + ')</th><th>測定日</th>' +
        '</tr></thead><tbody>';
      ranked.forEach(function (p, idx) {
        var rank = idx + 1;
        var cls = rank <= 3 ? ' class="rk-row-' + rank + '"' : '';
        html2 += '<tr' + cls + '>' +
          '<td class="rk-rank"><span class="rk-medal">' + medal(rank) + '</span> ' + rank + '</td>' +
          '<td>' + escapeHtml(p.name) + '</td>' +
          '<td class="num">' + p.score + '</td>' +
          '<td class="num">' + escapeHtml(p.date || '') + '</td>' +
          '</tr>';
      });
      html2 += '</tbody></table>';
      body.innerHTML = html2;
      note.textContent = '※各人の最新結果で集計しています。';
    }
  }

  function loadData() {
    var status = $('#rk-status');
    if (!WEBAPP_URL || WEBAPP_URL.indexOf('http') !== 0) {
      status.textContent = '未設定：このページのWEBAPP_URLにApps ScriptのURLを貼り付けてください。';
      $('#rk-body').innerHTML = '';
      return;
    }
    status.textContent = '読み込み中…';
    fetch(WEBAPP_URL + '?action=data')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.status === 'ok') {
          allRecords = data.records || [];
          status.textContent = '最終更新：' + new Date().toLocaleString('ja-JP') + '（登録件数 ' + allRecords.length + '件）';
          render();
        } else {
          status.textContent = 'データ取得に失敗しました。';
        }
      })
      .catch(function (err) {
        console.error(err);
        status.textContent = 'データ取得に失敗しました。URLの設定やデプロイ範囲（全員）をご確認ください。';
      });
  }

  loadData();
})();
</script>
</body>
</html>
